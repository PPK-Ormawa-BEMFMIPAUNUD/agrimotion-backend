version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agrimotion-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: agrimotion
      POSTGRES_PASSWORD: agrimotion
      POSTGRES_DB: agrimotion
    volumes:
      - pgdata:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: agrimotion-mosquitto
    restart: unless-stopped
    ports:
      - '1883:1883'
      - '9001:9001'
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

volumes:
  pgdata:
  mosquitto_data:
  mosquitto_log:
